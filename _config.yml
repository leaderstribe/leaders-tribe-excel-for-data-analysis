title: "Excel for Data Analysis for Women"
description: "A practical training program empowering women with data skills — by Leaders Tribe."
url: ""
baseurl: ""

# Explicitly set theme to nothing so GitHub Pages does not fall back to jekyll-theme-primer
# jekyll-theme-primer ships a style.scss that breaks builds when no Sass environment is available
theme: null

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-default-layout
  - jekyll-titles-from-headings

relative_links:
  enabled: true
  collections: false

optional_front_matter:
  remove_originals: false

titles_from_headings:
  enabled: true
  strip_title: false
  collections: false

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
